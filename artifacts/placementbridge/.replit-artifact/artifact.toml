kind = "web"
previewPath = "/"
title = "PlacementBridge"
version = "1.0.0"
id = "artifacts/placementbridge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24583

[services.development]
run = "pnpm --filter @workspace/placementbridge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/placementbridge", "run", "build" ]
publicDir = "artifacts/placementbridge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24583"
BASE_PATH = "/"
